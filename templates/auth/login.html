<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ dir }}" class="{{ theme }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocIQ</title>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root { --accent: #3B82F6; --primary: #1B2A4A; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: {% if lang == 'ar' %}'Cairo'{% else %}'Inter'{% endif %}, sans-serif;
      background: linear-gradient(135deg, #0F172A 0%, #1B2A4A 60%, #0F172A 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.04); backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.09); border-radius: 22px;
      padding: 2.25rem 2rem; width: 100%; max-width: 440px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.45);
    }
    .fi {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.13); border-radius: 10px;
      padding: 0.72rem 1rem; color: white; font-size: 0.875rem;
      outline: none; transition: 0.2s; font-family: inherit;
    }
    .fi:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.18); }
    .fi::placeholder { color: rgba(255,255,255,0.28); }
    .fi-icon { {% if dir == 'rtl' %}padding-right: 2.7rem;{% else %}padding-left: 2.7rem;{% endif %} }
    .fi-eye  { {% if dir == 'rtl' %}padding-right: 2.7rem; padding-left: 2.7rem;{% else %}padding-left: 2.7rem; padding-right: 2.7rem;{% endif %} }
    label { font-size: 0.79rem; color: rgba(255,255,255,0.55); margin-bottom: 0.35rem; display: block; font-weight: 600; }
    .field { margin-bottom: 1rem; }
    .iw { position: relative; }
    .iw-icon {
      position: absolute; top: 50%; transform: translateY(-50%);
      {% if dir == 'rtl' %}right: 1rem;{% else %}left: 1rem;{% endif %}
      color: rgba(255,255,255,0.3); font-size: 0.82rem; pointer-events: none;
    }
    .iw-eye {
      position: absolute; top: 50%; transform: translateY(-50%);
      {% if dir == 'rtl' %}left: 1rem;{% else %}right: 1rem;{% endif %}
      background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.3);
    }
    .btn {
      width: 100%; background: var(--accent); color: white; border: none;
      padding: 0.85rem; border-radius: 10px; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: 0.2s; font-family: inherit; margin-top: 0.25rem;
    }
    .btn:hover { background: #2563EB; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .tab-bar { display: flex; gap: 0.4rem; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 0.3rem; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 0.6rem; border: none; cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: 700; border-radius: 8px; transition: 0.2s; }
    .tab.on  { background: var(--accent); color: white; }
    .tab.off { background: transparent; color: rgba(255,255,255,0.38); }
    .tab.off:hover { color: rgba(255,255,255,0.65); }
    .alert { border-radius: 9px; padding: 0.62rem 0.9rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; }
    .alert-e { background: rgba(239,68,68,0.14); border: 1px solid rgba(239,68,68,0.28); color: #FCA5A5; }
    .alert-s { background: rgba(16,185,129,0.14); border: 1px solid rgba(16,185,129,0.28); color: #6EE7B7; }

    /* ── Admin popup ── */
    #adm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
      z-index: 9000; align-items: center; justify-content: center;
    }
    #adm-overlay.show { display: flex; }
    #adm-box {
      background: linear-gradient(145deg,#0F172A,#1B2A4A);
      border: 1px solid rgba(255,255,255,0.13); border-radius: 20px;
      padding: 1.875rem; width: 100%; max-width: 380px; margin: 1rem;
      box-shadow: 0 35px 90px rgba(0,0,0,0.55);
      animation: popIn 0.22s ease;
    }
    @keyframes popIn { from { opacity:0; transform:scale(0.91) translateY(14px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .adm-fi {
      width: 100%; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14); border-radius: 10px;
      padding: 0.68rem 1rem; color: white; font-size: 0.875rem;
      outline: none; transition: 0.2s; font-family: inherit;
      {% if dir == 'rtl' %}padding-right: 2.6rem;{% else %}padding-left: 2.6rem;{% endif %}
    }
    .adm-fi:focus { border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59,130,246,0.18); }
    .adm-fi::placeholder { color: rgba(255,255,255,0.28); }
  </style>
</head>
<body x-data="authApp()">

<div style="width:100%;max-width:440px;padding:1rem;">
  <div class="card">

    <!-- Logo — double-click = admin popup -->
    <div id="auth-logo" style="text-align:center;margin-bottom:1.5rem;cursor:default;user-select:none;">
      <div style="width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.7rem;font-size:1.4rem;transition:0.15s;">
        <i class="fa fa-brain" style="color:white;"></i>
      </div>
      <div style="color:white;font-weight:800;font-size:1.1rem;">DocIQ</div>
      <div style="color:rgba(255,255,255,0.35);font-size:0.78rem;margin-top:0.2rem;">
        {% if lang == 'ar' %}منصة ذكاء المستندات{% else %}Document Intelligence Platform{% endif %}
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab" :class="tab==='login' ? 'on' : 'off'" @click="tab='login'; clear()">
        <i class="fa fa-right-to-bracket" style="margin-{% if dir == 'rtl' %}left{% else %}right{% endif %}:0.4rem;"></i>
        {% if lang == 'ar' %}تسجيل الدخول{% else %}Sign In{% endif %}
      </button>
      <button class="tab" :class="tab==='reg' ? 'on' : 'off'" @click="tab='reg'; clear()">
        <i class="fa fa-user-plus" style="margin-{% if dir == 'rtl' %}left{% else %}right{% endif %}:0.4rem;"></i>
        {% if lang == 'ar' %}حساب جديد{% else %}Register{% endif %}
      </button>
    </div>

    <!-- Alerts -->
    <div x-show="err" class="alert alert-e"><i class="fa fa-circle-exclamation"></i> <span x-text="err"></span></div>
    <div x-show="ok"  class="alert alert-s"><i class="fa fa-circle-check"></i> <span x-text="ok"></span></div>

    <!-- ═══ LOGIN ═══ -->
    <form x-show="tab==='login'" method="POST" action="/auth/login">
      {% if error %}
      <div class="alert alert-e"><i class="fa fa-circle-exclamation"></i> {{ error }}</div>
      {% endif %}

      <div class="field">
        <label>{% if lang == 'ar' %}البريد الإلكتروني{% else %}Email{% endif %}</label>
        <div class="iw">
          <i class="fa fa-envelope iw-icon"></i>
          <input type="email" name="email" class="fi fi-icon" placeholder="{% if lang == 'ar' %}بريدك الإلكتروني{% else %}your@email.com{% endif %}" required autocomplete="email" />
        </div>
      </div>

      <div class="field" x-data="{show:false}">
        <label>{% if lang == 'ar' %}كلمة المرور{% else %}Password{% endif %}</label>
        <div class="iw">
          <i class="fa fa-lock iw-icon"></i>
          <input :type="show?'text':'password'" name="password" class="fi fi-eye" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="iw-eye" @click="show=!show"><i :class="show?'fa fa-eye-slash':'fa fa-eye'" style="font-size:0.82rem;"></i></button>
        </div>
      </div>

      <button type="submit" class="btn">
        <i class="fa fa-right-to-bracket" style="margin-{% if dir == 'rtl' %}left{% else %}right{% endif %}:0.5rem;"></i>
        {% if lang == 'ar' %}دخول{% else %}Sign In{% endif %}
      </button>
    </form>

    <!-- ═══ REGISTER ═══ -->
    <form x-show="tab==='reg'" x-cloak @submit.prevent="doRegister">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-bottom:1rem;">
        <div>
          <label>{% if lang == 'ar' %}الاسم الأول{% else %}First Name{% endif %}</label>
          <input type="text" x-model="r.fn" class="fi" placeholder="{% if lang == 'ar' %}محمد{% else %}John{% endif %}" required />
        </div>
        <div>
          <label>{% if lang == 'ar' %}الأخير{% else %}Last Name{% endif %}</label>
          <input type="text" x-model="r.ln" class="fi" placeholder="{% if lang == 'ar' %}أحمد{% else %}Doe{% endif %}" required />
        </div>
      </div>

      <div class="field">
        <label>{% if lang == 'ar' %}البريد الإلكتروني{% else %}Email{% endif %}</label>
        <div class="iw">
          <i class="fa fa-envelope iw-icon"></i>
          <input type="email" x-model="r.email" class="fi fi-icon" placeholder="you@company.com" required autocomplete="email" />
        </div>
      </div>

      <div class="field">
        <label>{% if lang == 'ar' %}الشركة / المؤسسة{% else %}Organization{% endif %}</label>
        <div class="iw">
          <i class="fa fa-building iw-icon"></i>
          <input type="text" x-model="r.org" class="fi fi-icon" placeholder="{% if lang == 'ar' %}اختياري{% else %}Optional{% endif %}" />
        </div>
      </div>

      <div class="field" x-data="{show:false}">
        <label>{% if lang == 'ar' %}كلمة المرور{% else %}Password{% endif %}</label>
        <div class="iw">
          <i class="fa fa-lock iw-icon"></i>
          <input :type="show?'text':'password'" x-model="r.pw" class="fi fi-eye" placeholder="{% if lang == 'ar' %}٨ أحرف على الأقل{% else %}Min 8 chars{% endif %}" required />
          <button type="button" class="iw-eye" @click="show=!show"><i :class="show?'fa fa-eye-slash':'fa fa-eye'" style="font-size:0.82rem;"></i></button>
        </div>
      </div>

      <div class="field" x-data="{show:false}">
        <label>{% if lang == 'ar' %}تأكيد كلمة المرور{% else %}Confirm Password{% endif %}</label>
        <div class="iw">
          <i class="fa fa-lock iw-icon"></i>
          <input :type="show?'text':'password'" x-model="r.pw2" class="fi fi-eye" placeholder="••••••••" required />
          <button type="button" class="iw-eye" @click="show=!show"><i :class="show?'fa fa-eye-slash':'fa fa-eye'" style="font-size:0.82rem;"></i></button>
        </div>
      </div>

      <button type="submit" class="btn" :disabled="busy"
        style="background:linear-gradient(135deg,#3B82F6,#6366F1);">
        <template x-if="!busy">
          <span><i class="fa fa-user-plus" style="margin-{% if dir == 'rtl' %}left{% else %}right{% endif %}:0.5rem;"></i>{% if lang == 'ar' %}إنشاء الحساب{% else %}Create Account{% endif %}</span>
        </template>
        <template x-if="busy">
          <span><i class="fa fa-spinner fa-spin" style="margin-{% if dir == 'rtl' %}left{% else %}right{% endif %}:0.5rem;"></i>{% if lang == 'ar' %}جارٍ الإنشاء...{% else %}Creating...{% endif %}</span>
        </template>
      </button>
    </form>

    <!-- Lang switcher -->
    <div style="margin-top:1.4rem;display:flex;justify-content:center;gap:0.5rem;">
      <form method="POST" action="/auth/set-lang"><input type="hidden" name="lang" value="ar" />
        <button type="submit" style="background:none;border:1px solid rgba(255,255,255,{% if lang=='ar' %}0.3{% else %}0.1{% endif %});color:rgba(255,255,255,{% if lang=='ar' %}0.9{% else %}0.4{% endif %});border-radius:6px;padding:0.3rem 0.7rem;font-size:0.78rem;cursor:pointer;font-family:inherit;">عربي</button>
      </form>
      <form method="POST" action="/auth/set-lang"><input type="hidden" name="lang" value="en" />
        <button type="submit" style="background:none;border:1px solid rgba(255,255,255,{% if lang=='en' %}0.3{% else %}0.1{% endif %});color:rgba(255,255,255,{% if lang=='en' %}0.9{% else %}0.4{% endif %});border-radius:6px;padding:0.3rem 0.7rem;font-size:0.78rem;cursor:pointer;font-family:inherit;">English</button>
      </form>
    </div>
  </div>
</div>

<!-- ══════════ ADMIN POPUP ══════════ -->
<div id="adm-overlay">
  <div id="adm-box">
    <div style="text-align:center;margin-bottom:1.25rem;">
      <div style="width:44px;height:44px;background:#3B82F6;border-radius:11px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.6rem;font-size:1.1rem;">
        <i class="fa fa-shield-halved" style="color:white;"></i>
      </div>
      <div style="color:white;font-weight:800;font-size:1rem;">{% if lang == 'ar' %}دخول المدير{% else %}Admin Access{% endif %}</div>
      <div style="color:rgba(255,255,255,0.35);font-size:0.75rem;margin-top:0.15rem;">DocIQ Control Panel</div>
    </div>

    <div id="adm-err" style="display:none;background:rgba(239,68,68,0.14);border:1px solid rgba(239,68,68,0.28);border-radius:8px;padding:0.58rem 0.85rem;color:#FCA5A5;font-size:0.78rem;margin-bottom:0.9rem;"></div>

    <div class="field">
      <label style="color:rgba(255,255,255,0.5);">{% if lang == 'ar' %}البريد{% else %}Email{% endif %}</label>
      <div class="iw">
        <i class="fa fa-envelope iw-icon"></i>
        <input id="adm-email" type="email" class="adm-fi" placeholder="admin@dociq.io" autocomplete="username" />
      </div>
    </div>
    <div class="field" style="margin-bottom:0;">
      <label style="color:rgba(255,255,255,0.5);">{% if lang == 'ar' %}كلمة المرور{% else %}Password{% endif %}</label>
      <div class="iw">
        <i class="fa fa-lock iw-icon"></i>
        <input id="adm-pw" type="password" class="adm-fi" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <button id="adm-btn" onclick="admLogin()" style="width:100%;background:#3B82F6;color:white;border:none;padding:0.78rem;border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:1.1rem;font-family:inherit;transition:0.2s;">
      <i class="fa fa-right-to-bracket" style="margin-{% if dir == 'rtl' %}left{% else %}right{% endif %}:0.4rem;"></i>
      {% if lang == 'ar' %}دخول{% else %}Sign In{% endif %}
    </button>
    <button onclick="closeAdm()" style="display:block;width:100%;margin-top:0.6rem;background:none;border:none;color:rgba(255,255,255,0.3);font-size:0.78rem;cursor:pointer;font-family:inherit;">
      {% if lang == 'ar' %}إغلاق{% else %}Close{% endif %}
    </button>
  </div>
</div>

<script>
  function authApp() {
    return {
      tab: '{% if tab == "reg" %}reg{% else %}login{% endif %}',
      err: '', ok: '', busy: false,
      r: { fn:'', ln:'', email:'', org:'', pw:'', pw2:'' },
      clear() { this.err = ''; this.ok = ''; },
      async doRegister() {
        this.clear();
        const { fn, ln, email, pw, pw2, org } = this.r;
        if (!fn.trim() || !ln.trim()) { this.err = '{% if lang == "ar" %}أدخل الاسم الأول والأخير{% else %}Enter first and last name{% endif %}'; return; }
        if (!email.trim())            { this.err = '{% if lang == "ar" %}أدخل البريد الإلكتروني{% else %}Enter your email{% endif %}'; return; }
        if (pw.length < 8)            { this.err = '{% if lang == "ar" %}كلمة المرور ٨ أحرف على الأقل{% else %}Password must be at least 8 chars{% endif %}'; return; }
        if (pw !== pw2)               { this.err = '{% if lang == "ar" %}كلمتا المرور غير متطابقتين{% else %}Passwords do not match{% endif %}'; return; }
        this.busy = true;
        try {
          const res = await fetch('/auth/register', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ name: fn.trim()+' '+ln.trim(), email: email.trim(), password: pw, department: org.trim()||null })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || '{% if lang == "ar" %}خطأ في الإنشاء{% else %}Registration error{% endif %}');
          this.ok = '{% if lang == "ar" %}تم إنشاء حسابك بنجاح! يمكنك الدخول الآن{% else %}Account created! You can sign in now{% endif %}';
          this.r = { fn:'', ln:'', email:'', org:'', pw:'', pw2:'' };
          setTimeout(() => { this.tab = 'login'; this.clear(); }, 2200);
        } catch(e) { this.err = e.message; }
        finally { this.busy = false; }
      }
    };
  }

  /* ── Double-click logo → admin popup ── */
  let _lc = 0, _lt = null;
  document.getElementById('auth-logo').addEventListener('click', () => {
    _lc++;
    if (_lc === 1) { _lt = setTimeout(() => { _lc = 0; }, 380); }
    else if (_lc >= 2) { clearTimeout(_lt); _lc = 0; openAdm(); }
  });

  function openAdm() {
    document.getElementById('adm-overlay').classList.add('show');
    setTimeout(() => document.getElementById('adm-email').focus(), 80);
  }
  function closeAdm() {
    document.getElementById('adm-overlay').classList.remove('show');
    document.getElementById('adm-err').style.display = 'none';
    document.getElementById('adm-pw').value = '';
  }
  document.getElementById('adm-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('adm-overlay')) closeAdm();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAdm(); });
  ['adm-email','adm-pw'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') admLogin(); })
  );

  async function admLogin() {
    const btn = document.getElementById('adm-btn');
    const errEl = document.getElementById('adm-err');
    const email = document.getElementById('adm-email').value.trim();
    const pw    = document.getElementById('adm-pw').value;
    if (!email || !pw) { showAdmErr('{% if lang == "ar" %}أدخل البريد وكلمة المرور{% else %}Enter email and password{% endif %}'); return; }
    btn.disabled = true;
    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i>';
    errEl.style.display = 'none';
    try {
      const fd = new URLSearchParams(); fd.append('username', email); fd.append('password', pw);
      const res = await fetch('/api/v1/auth/token', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: fd });
      if (!res.ok) { const d = await res.json().catch(()=>({})); throw new Error(d.detail || '{% if lang == "ar" %}بيانات غير صحيحة{% else %}Invalid credentials{% endif %}'); }
      const d = await res.json();
      if (!['super_admin','admin','manager'].includes(d.user_role))
        throw new Error('{% if lang == "ar" %}ليس لديك صلاحية الوصول{% else %}Insufficient permissions{% endif %}');
      localStorage.setItem('dociq_admin_token', d.access_token);
      localStorage.setItem('dociq_admin_user', JSON.stringify({name:d.user_name,role:d.user_role}));
      window.location.href = '/admin/index.html';
    } catch(e) {
      showAdmErr(e.message);
      btn.disabled = false;
      btn.innerHTML = '<i class="fa fa-right-to-bracket" style="margin-{% if dir == "rtl" %}left{% else %}right{% endif %}:0.4rem;"></i>{% if lang == "ar" %}دخول{% else %}Sign In{% endif %}';
    }
  }
  function showAdmErr(m) { const e = document.getElementById('adm-err'); e.textContent = m; e.style.display = 'block'; }
</script>
</body>
</html>
