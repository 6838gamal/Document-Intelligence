<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocIQ — تسجيل الدخول</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563eb'/><path d='M10 10h8l4 4v12H10z' fill='white' opacity='.9'/><path d='M18 10v4h4' fill='none' stroke='%232563eb' stroke-width='1.5'/><path d='M13 17h6M13 20h5' stroke='%232563eb' stroke-width='1.5' stroke-linecap='round'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 shadow-lg mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">DocIQ</h1>
      <p class="text-slate-400 text-sm mt-1">لوحة التحكم الإدارية</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">
      <h2 class="text-lg font-semibold text-white mb-6 text-center">تسجيل الدخول</h2>

      <div id="error-msg" class="hidden mb-4 p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-300 text-sm text-center"></div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">البريد الإلكتروني</label>
          <input id="email" type="email" required autocomplete="email"
            class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-white placeholder-slate-500
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="admin@dociq.io" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">كلمة المرور</label>
          <input id="password" type="password" required autocomplete="current-password"
            class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-white placeholder-slate-500
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="••••••••" />
        </div>
        <button type="submit" id="submit-btn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition
                 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
          <span id="btn-text">دخول</span>
          <svg id="btn-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
        </button>
      </form>

      <p class="text-center text-slate-500 text-xs mt-6">
        هذه اللوحة مخصصة للمديرين والمشرفين فقط
      </p>

      <div class="mt-5 pt-5 border-t border-slate-700 text-center">
        <a href="/auth/login"
           class="inline-flex items-center gap-2 text-slate-400 hover:text-blue-400 text-sm transition-colors duration-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          العودة إلى منصة العملاء
        </a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (API.token()) window.location.href = "index.html";

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const spinner = document.getElementById("btn-spinner");
      const errDiv = document.getElementById("error-msg");
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      btn.disabled = true;
      spinner.classList.remove("hidden");
      errDiv.classList.add("hidden");

      try {
        const data = await API.login(email, password);
        if (!["super_admin", "admin", "manager"].includes(data.user_role)) {
          throw new Error("ليس لديك صلاحية الوصول إلى لوحة التحكم");
        }
        localStorage.setItem(CONFIG.TOKEN_KEY, data.access_token);
        localStorage.setItem(CONFIG.USER_KEY, JSON.stringify({ name: data.user_name, role: data.user_role }));
        window.location.href = "index.html";
      } catch (err) {
        errDiv.textContent = err.message;
        errDiv.classList.remove("hidden");
        btn.disabled = false;
        spinner.classList.add("hidden");
      }
    });
  </script>
</body>
</html>
